name: pr-ci
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined import-smoke / tests / audit jobs with thin
# `uses:` calls into scitex-ai/.github reusable workflows — same job
# bodies, now centrally maintained. `dep-hygiene-smoke` has no reusable
# equivalent yet and stays inline. Triggers/concurrency preserved verbatim
# from the prior local file.
#
# New required-status-check contexts (see comments per job below) may not
# match OLD required-status-check contexts on develop/main branch
# protection — branch protection updated as part of this PR where needed.
#
# NOTE: the reusable `pytest-matrix` always runs the full
# ["3.11","3.12","3.13"] matrix; the prior inline `tests` job only did
# that on `pull_request` and ran a single 3.12 leg on other triggers
# (e.g. workflow_dispatch). Small cost increase on workflow_dispatch
# runs, not a coverage regression.
# NOTE: the reusable `quality-audit` runs
# `scitex-dev ecosystem audit-all "$DIST" --path "$PWD"` (no
# `--no-version-check`), whereas the prior inline `audit` job passed
# `--no-version-check`. Worth watching the first PR run for a new
# version-check-related failure mode that didn't exist before.

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '_skills/**'
      - 'examples/**'
      - '**.md'
      - 'CHANGELOG.*'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  import-smoke:
    # New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit

  dep-hygiene-smoke:
    # No reusable-workflow equivalent yet — left inline.
    name: dep-hygiene-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.11 (uv-managed)
        run: uv python install 3.11
      - name: Bare install (no extras) in uv venv
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python .
      - name: Import package
        run: .venv/bin/python -c "import scitex_cv; print(scitex_cv.__name__)"

  pytest-matrix:
    # New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit

  quality-audit:
    # New required-status-check context: "quality-audit / audit"
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit
